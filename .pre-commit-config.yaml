repos:
  - repo: local
    hooks:
      - id: format-check
        name: format check
        entry: ./scripts/format.sh check
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: lint
        name: lint
        entry: ./scripts/lint.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: test
        name: tests
        entry: ./scripts/test.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
