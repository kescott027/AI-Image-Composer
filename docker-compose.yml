services:
  postgres:
    image: postgres:16
    container_name: ai-image-composer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_image_composer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${AIIC_POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_image_composer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
