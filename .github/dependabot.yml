version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:05"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:10"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
